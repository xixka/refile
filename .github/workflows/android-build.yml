name: Android Build

on:
  push:
    tags:
      - 'dev'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run :core JVM tests
        run: ./gradlew :core:test --console=plain

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Prepare APK asset
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk dist/refile-dev.apk

      - name: Delete existing dev release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes --cleanup-tag=false || true

      - name: Create dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create dev dist/refile-dev.apk \
            --title "dev" \
            --notes "Auto build from tag dev @ $(git rev-parse --short HEAD)" \
            --target main
