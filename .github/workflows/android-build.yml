name: Android Build & Pre-release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Run :core JVM tests
        run: ./gradlew :core:test --console=plain

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          tag_name: prerelease-${{ github.run_id }}
          files: app/build/outputs/apk/release/*.apk
          body: |
            自动构建（分支 ${{ github.ref_name }} - commit ${{ github.sha }}）
