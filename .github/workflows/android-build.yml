name: Android Build & Pre-release

on:
  push:
    branches:
      - 'dev/*'
      - 'feature/*'
      - 'release/*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run :core JVM tests
        run: ./gradlew :core:test --console=plain

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          tag_name: prerelease-${{ github.run_id }}
          files: app/build/outputs/apk/release/*.apk
          body: |
            自动构建（分支 ${{ github.ref_name }} - commit ${{ github.sha }}）
