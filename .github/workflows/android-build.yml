name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run :core JVM tests
        run: ./gradlew :core:test --console=plain

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Delete previous dev release & tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Publish dev build to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: dev
          body: |
            Automated dev build from `main`.

            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Built at: ${{ github.event.head_commit.timestamp }}
          prerelease: true
          files: app/build/outputs/apk/release/*.apk
